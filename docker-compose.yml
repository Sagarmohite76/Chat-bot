version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      # Override the DB host to point to the postgres container
      - POSTGRES_HOST=db
      # If using a local Qdrant container instead of cloud, you can override the URL here:
      # - QDRANT_URL=http://qdrant:6333
    depends_on:
      - db
    networks:
      - chatbot-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - chatbot-network

  db:
    image: postgres:15-alpine
    restart: always
    env_file:
      - ./backend/.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - chatbot-network

  # Optional local Qdrant (uncomment if you want to run it locally)
  # qdrant:
  #   image: qdrant/qdrant
  #   ports:
  #     - "6333:6333"
  #   volumes:
  #     - qdrant_data:/qdrant/storage
  #   networks:
  #     - chatbot-network

volumes:
  postgres_data:
  # qdrant_data:

networks:
  chatbot-network:
    driver: bridge
